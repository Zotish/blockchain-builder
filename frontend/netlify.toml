# Netlify build settings for Next.js frontend

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Environment variables — also set these in Netlify dashboard
# NEXT_PUBLIC_API_URL  = https://your-backend.up.railway.app/api
# NEXT_PUBLIC_WS_URL   = https://your-backend.up.railway.app

# Redirect all routes to Next.js (SPA-style)
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/___netlify-handler"
  status = 200

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[plugins]]
  package = "@netlify/plugin-nextjs"

